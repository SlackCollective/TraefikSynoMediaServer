########################### NETWORKS
networks:
  mediaserver:
    driver: bridge
    name: mediaserver
    external: true
  socket-proxy:
    driver: bridge
    name: socket-proxy
    external: true

services:
########################### REVERSE PROXY / NETWORKING / SECURITY    
  # Traefik 3 - Reverse Proxy
  traefik:
    image: traefik:v3
    container_name: traefik
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    networks:
      mediaserver:
      socket-proxy:
    ports:
      - 89:80
      - 449:443
      - 127.0.0.1:8080:8080 # http api dashboard
    command: # CLI arguments
      # Dashboard, Ping, Telemetry
      - --global.sendAnonymousUsage=false
      - --global.checknewversion=true
      - --api.dashboard=true
      - --api.insecure=false
      - --ping=true
      # Providers, Entrypoints
      - --providers.docker=true
      # - --providers.docker.endpoint=unix:///var/run/docker.sock # Disable for Socket Proxy. Enable otherwise.
      - --providers.docker.endpoint=tcp://socket-proxy:2375 # Enable for Socket Proxy. Disable otherwise.
      - --providers.docker.exposedByDefault=true
      - --providers.docker.network=mediaserver
      - --providers.file.directory=/rules # Load dynamic configuration from one or more .toml or .yml files in a directory
      - --providers.file.watch=true # Only works on top level files in the rules folder
      - --entrypoints.http.address=:80
      - --entrypoints.https.address=:443
      - --entrypoints.http.http.redirections.entrypoint.to=https 
      # For headers
      - --entrypoints.http.forwardedHeaders.trustedIPs=$TRUSTED_IPS
      - --entrypoints.https.forwardedHeaders.trustedIPs=$TRUSTED_IPS
      # Logging
      - --entryPoints.http.observability.accessLogs=true
      - --entryPoints.https.observability.accessLogs=true
      - --accesslog.bufferingsize=50
      - --accesslog.filters.statuscodes=200,300-302
      - --accesslog.filters.retryattempts
      - --accesslog.filters.minduration=10ms
      - --metrics.prometheus=false
      # TLS
      - --entrypoints.https.http.tls=true
      # - --certificatesresolvers.cloudflare.acme.caserver=https://acme-staging-v02.api.letsencrypt.org/directory
      - --entrypoints.https.http.tls.certresolver=cloudflare
      - --entrypoints.https.http.tls.domains[0].main=$DOMAINNAME
      - --entrypoints.https.http.tls.domains[0].sans=*.$DOMAINNAME
      - --certificatesresolvers.cloudflare.acme.email=$CF_EMAIL
      - --certificatesresolvers.cloudflare.acme.storage=/certs/acme.json
      - --certificatesResolvers.cloudflare.acme.dnsChallenge.provider=cloudflare
      - --certificatesResolvers.cloudflare.acme.dnsChallenge.resolvers=1.1.1.1:53,1.0.0.1:53
      - --certificatesResolvers.cloudflare.acme.dnsChallenge.propagation.delayBeforeChecks=90
    volumes:
      - $APPDIR/traefik:/etc/traefik
      - $APPDIR/traefik/rules:/rules
      - $DOCKERDIR/certs:/certs
    environment:
      - TZ=$TZ
      - CF_API_EMAIL=$CF_EMAIL
      - CF_API_KEY=$CF_API_KEY
      - DOMAINNAME # Passing this to use the variable in rules.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      # HTTP Routers - Dashboard
      - traefik.http.routers.dashboard.entrypoints=https
      - traefik.http.routers.dashboard.rule=Host(`traefik.$DOMAINNAME`)
      # Middlewares
      - traefik.http.routers.dashboard.middlewares=chain-auth@file
      # Services - API
      - traefik.http.routers.dashboard.service=api@internal
      ## Updating and notifications
      - org.hotio.pullio.notify=true
      - org.hotio.pullio.update=true
      - org.hotio.pullio.discord.webhook=$DISCORD
      - org.hotio.pullio.generic.webhook=$PULLIO

  # Socket-Proxy - Proxy for docker.sock to avoid direct exposure
  socket-proxy:
    image: lscr.io/linuxserver/socket-proxy:latest
    container_name: socket-proxy
    restart: unless-stopped
    healthcheck:
      test: wget --spider http://localhost:2375/version || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    read_only: true
    networks:
      socket-proxy:
    ports:
      - 127.0.0.1:2375:2375
    tmpfs:
      - /run
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - ALLOW_START=1 #optional
      - ALLOW_STOP=1 #optional
      - ALLOW_RESTARTS=1 #optional
      - ALLOW_PAUSE=0 #optional
      - ALLOW_UNPAUSE=0 #optional
      - AUTH=1 #optional
      - BUILD=0 #optional
      - COMMIT=0 #optional
      - CONFIGS=0 #optional
      - CONTAINERS=1 #optional
      - DISABLE_IPV6=1 #optional
      - DISTRIBUTION=0 #optional
      - EVENTS=1 #optional
      - EXEC=0 #optional
      - IMAGES=1 #optional
      - INFO=1 #optional
      - LOG_LEVEL=info #optional
      - NETWORKS=1 #optional
      - LOGS=1 #optional
      - NODES=1 #optional
      - PING=1 #optional
      - PLUGINS=1 #optional
      - POST=1 #optional
      - SECRETS=0 #optional
      - SERVICES=1 #optional
      - SESSION=1 #optional
      - SWARM=0 #optional
      - SYSTEM=1 #optional
      - TASKS=1 #optional
      - TZ=$TZ #optional
      - VERSION=1 #optional
      - VOLUMES=1 #optional
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      ## Updating and notifications
      - org.hotio.pullio.notify=true
      - org.hotio.pullio.update=true
      - org.hotio.pullio.discord.webhook=$DISCORD
      - org.hotio.pullio.generic.webhook=$PULLIO

  # OAuth - Single Sign On using OAuth 2.0
  auth:
    image: ghcr.io/italypaleale/traefik-forward-auth:4
    container_name: auth
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/traefik-forward-auth", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    user: $PUID:$PGID
    security_opt:
      - no-new-privileges:true
    networks:
      mediaserver:
    volumes:
      - $APPDIR/auth:/etc/traefik-forward-auth
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      # HTTP Routers
      - traefik.http.routers.auth.entrypoints=https
      - traefik.http.routers.auth.rule=Host(`auth.$DOMAINNAME`)
      # Middlewares
      - traefik.http.routers.auth.middlewares=chain-noauth@file
      # HTTP Services
      - traefik.http.services.auth.loadbalancer.server.port=4181
      ## Updating and notifications
      - org.hotio.pullio.notify=true
      - org.hotio.pullio.update=true
      - org.hotio.pullio.discord.webhook=$DISCORD
      - org.hotio.pullio.generic.webhook=$PULLIO

  # Gluetun - VPN for torrents, then a healthcheck/restart container for dependencies
  gluetun:
    image: qmcgaw/gluetun:v3.41.1
    container_name: gluetun
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.disable_ipv6=1
    networks:
      mediaserver:
    ports:
      - 8000:8000/tcp # gluetun control server
      - 9997:9997 # qBit WebUI
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - $APPDIR/gluetun:/config
      - $APPDIR/gluetun/auth/config.toml:/config/auth/config.toml
      - /lib/modules:/lib/modules:ro
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      - STORAGE_FILEPATH=/config/servers.json
      - VPN_SERVICE_PROVIDER=airvpn
      - VPN_TYPE=wireguard
      - DNS_SERVER=off # if toggled, the next line must be commented out
      # - DNS_SERVER=https://1.1.1.1/dns-query
      - DNS_UPSTREAM_RESOLVER_TYPE=dot # dot for tls, doh for http
      - DNS_UPSTREAM_RESOLVERS=cloudflare
      - WIREGUARD_PRIVATE_KEY=$WIREGUARD_PRIVATE_KEY
      - WIREGUARD_PRESHARED_KEY=$WIREGUARD_PRESHARED_KEY
      - WIREGUARD_ADDRESSES=$WIREGUARD_ADDRESSES
      - WIREGUARD_PERSISTENT_KEEPALIVE_INTERVAL=25s
      - SERVER_COUNTRIES=Netherlands
      - UPDATER_PERIOD=24h #Frequent DNS Update was causing qbit to lose connection
      - FIREWALL_OUTBOUND_SUBNETS=192.168.1.0/24,172.18.0.0/16
      - FIREWALL_VPN_INPUT_PORTS=51007
      - HTTP_CONTROL_SERVER_AUTH_CONFIG_FILEPATH=/config/auth/config.toml
      - LOG_LEVEL=info
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      # HTTP Routers
      - traefik.http.routers.qbittorrent.entrypoints=https
      - traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.$DOMAINNAME`)
      # HTTP Routers Auth Bypass (for NZB360 â€” qBit uses its own session auth on /api/v2)
      - traefik.http.routers.qbittorrent-bypass.entrypoints=https
      - traefik.http.routers.qbittorrent-bypass.rule=Host(`qbittorrent.$DOMAINNAME`) && PathPrefix(`/api/v2`)
      - traefik.http.routers.qbittorrent-bypass.priority=100
      # Middlewares
      - traefik.http.routers.qbittorrent.middlewares=chain-auth@file
      - traefik.http.routers.qbittorrent-bypass.middlewares=chain-api@file
      # HTTP Services
      - traefik.http.routers.qbittorrent.service=qbittorrent
      - traefik.http.routers.qbittorrent-bypass.service=qbittorrent
      - traefik.http.services.qbittorrent.loadbalancer.server.port=9997

  ############################# HOMEPAGE
  # Organizr - A dashboard for your server
  organizr:
    image: ghcr.io/organizr/organizr:latest
    container_name: organizr
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    networks:
      mediaserver:
    volumes:
      - $APPDIR/organizr:/config
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      # HTTP Routers
      - traefik.http.routers.organizr.entrypoints=https
      - traefik.http.routers.organizr.rule=Host(`$DOMAINNAME`)
      # Middlewares
      - traefik.http.routers.organizr.middlewares=chain-auth@file
      # HTTP Services
      - traefik.http.routers.organizr.service=organizr
      - traefik.http.services.organizr.loadbalancer.server.port=80
      ## Updating and notifications
      - org.hotio.pullio.notify=true
      - org.hotio.pullio.update=true
      - org.hotio.pullio.discord.webhook=$DISCORD
      - org.hotio.pullio.generic.webhook=$PULLIO

  ############################# INDEXERS
  # Prowlarr - Hydra and Jackett combined
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    tmpfs:
      - /tmp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9696/ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    networks:
      mediaserver:
    volumes:
      - $APPDIR/prowlarr:/config:rw
      - $DATADIR/torrents:/data/torrents:rw
      - $DATADIR/usenet:/data/usenet:rw
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      # HTTP Routers
      - traefik.http.routers.prowlarr.entrypoints=https
      - traefik.http.routers.prowlarr.rule=Host(`prowlarr.$DOMAINNAME`)
      # HTTP Routers Auth Bypass (for NZB360)
      - traefik.http.routers.prowlarr-bypass.entrypoints=https
      - traefik.http.routers.prowlarr-bypass.rule=Host(`prowlarr.$DOMAINNAME`) && (Header(`X-Api-Key`, `$PROWLARR_API_KEY`) || Query(`apikey`, `$PROWLARR_API_KEY`))
      - traefik.http.routers.prowlarr-bypass.priority=100
      # Middlewares
      - traefik.http.routers.prowlarr.middlewares=chain-auth@file
      - traefik.http.routers.prowlarr-bypass.middlewares=chain-api@file
      # HTTP Services
      - traefik.http.routers.prowlarr.service=prowlarr
      - traefik.http.routers.prowlarr-bypass.service=prowlarr
      - traefik.http.services.prowlarr.loadbalancer.server.port=9696
      ## Updating and notifications
      - org.hotio.pullio.notify=true
      - org.hotio.pullio.update=true
      - org.hotio.pullio.discord.webhook=$DISCORD
      - org.hotio.pullio.generic.webhook=$PULLIO

  ############################# DOWNLOADERS
  # SABnzbd - nzb downloader
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api?mode=version&output=json"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    networks:
      mediaserver:
    volumes:
      - $APPDIR/sabnzbd:/config
      - $DATADIR/usenet:/data/usenet:rw
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      - HAS_IPV6=false
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      # HTTP Routers
      - traefik.http.routers.sabnzbd.entrypoints=https
      - traefik.http.routers.sabnzbd.rule=Host(`sabnzbd.$DOMAINNAME`)
      # HTTP Routers Auth Bypass
      - traefik.http.routers.sabnzbd-bypass.entrypoints=https
      - traefik.http.routers.sabnzbd-bypass.rule=Host(`sabnzbd.$DOMAINNAME`) && (Header(`X-Api-Key`, `$SABNZBD_API_KEY`) || Query(`apikey`, `$SABNZBD_API_KEY`))
      - traefik.http.routers.sabnzbd-bypass.priority=100
      # Middlewares
      - traefik.http.routers.sabnzbd.middlewares=chain-auth@file
      - traefik.http.routers.sabnzbd-bypass.middlewares=chain-api@file
      # HTTP Services
      - traefik.http.routers.sabnzbd.service=sabnzbd
      - traefik.http.routers.sabnzbd-bypass.service=sabnzbd
      - traefik.http.services.sabnzbd.loadbalancer.server.port=8080
      ## Updating and notifications
      - org.hotio.pullio.notify=true
      - org.hotio.pullio.update=true
      - org.hotio.pullio.discord.webhook=$DISCORD
      - org.hotio.pullio.generic.webhook=$PULLIO

  # qbittorrent - LSIO container, using Gluetun for VPN
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9997/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    volumes:
      - $APPDIR/qbittorrent:/config:rw
      - $DATADIR/torrents:/data/torrents:rw
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      - WEBUI_PORT=9997
      - TORRENTING_PORT=51007
      - DOCKER_MODS=ghcr.io/vuetorrent/vuetorrent-lsio-mod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - traefik.enable=false
      ## Updating and notifications
      - org.hotio.pullio.notify=true
      - org.hotio.pullio.update=true
      - org.hotio.pullio.discord.webhook=$DISCORD
      - org.hotio.pullio.generic.webhook=$PULLIO

  # qbit_restart - torrent client restart when gluetun fails
  restart-qbittorrent:
    image: jakub95/restart-qbittorrent:latest
    container_name: restart-qbittorrent
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-f", "restart-qbittorrent.sh"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    networks:
      socket-proxy:
    depends_on:
      gluetun:
        condition: service_healthy
      qbittorrent:
        condition: service_started
    environment:
      - TZ=$TZ
      - QBITTORRENT_CONTAINER_NAME=qbittorrent
      - GLUETUN_CONTAINER_NAME=gluetun
      - DOCKER_HOST=tcp://socket-proxy:2375
    labels:
      - traefik.enable=false
      ## Updating and notifications
      - org.hotio.pullio.notify=true
      - org.hotio.pullio.update=true
      - org.hotio.pullio.discord.webhook=$DISCORD
      - org.hotio.pullio.generic.webhook=$PULLIO

  # qbit_manage - torrent client management
  qbit_manage:
    image: bobokun/qbit_manage
    container_name: qbitmanage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9996/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    networks:
      mediaserver:
    depends_on:
      qbittorrent:
        condition: service_healthy
    volumes:
      - $APPDIR/qbitmanage:/config:rw
      - $APPDIR/qbittorrent/:/qbittorrent/:ro
      - $DATADIR/torrents:/data/torrents:rw # match qbittorrent download dir
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      - QBT_PORT=9996
      - QBT_WEB_SERVER=true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      # HTTP Routers
      - traefik.http.routers.qbitmanage.entrypoints=https
      - traefik.http.routers.qbitmanage.rule=Host(`qbitmanage.$DOMAINNAME`)
      # Middlewares
      - traefik.http.routers.qbitmanage.middlewares=chain-auth@file
      # HTTP Services
      - traefik.http.routers.qbitmanage.service=qbitmanage
      - traefik.http.services.qbitmanage.loadbalancer.server.port=9996
      ## Updating and notifications
      - org.hotio.pullio.notify=true
      - org.hotio.pullio.update=true
      - org.hotio.pullio.discord.webhook=$DISCORD
      - org.hotio.pullio.generic.webhook=$PULLIO

  # autobrr - torrent RSS downloader
  autobrr:
    image: ghcr.io/autobrr/autobrr:latest
    container_name: autobrr
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474/api/healthz/liveness"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    user: $PUID:$PGID
    security_opt:
      - no-new-privileges:true
    networks:
      mediaserver:
    depends_on:
      qbittorrent:
        condition: service_healthy
    volumes:
      - $APPDIR/autobrr:/config
      - $APPDIR/autobrr/logs:/logs
    environment:
      - GOMAXPROCS=2
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      # HTTP Routers
      - traefik.http.routers.autobrr.entrypoints=https
      - traefik.http.routers.autobrr.rule=Host(`autobrr.$DOMAINNAME`)
      # Middlewares
      - traefik.http.routers.autobrr.middlewares=chain-auth@file
      # HTTP Services
      - traefik.http.routers.autobrr.service=autobrr
      - traefik.http.services.autobrr.loadbalancer.server.port=7474
      ## Updating and notifications
      - org.hotio.pullio.notify=true
      - org.hotio.pullio.update=true
      - org.hotio.pullio.discord.webhook=$DISCORD
      - org.hotio.pullio.generic.webhook=$PULLIO

  ############################# MEDIA SEARCH/INDEX
  # Radarr - Movies
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    tmpfs:
      - /tmp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7878/ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    networks:
      mediaserver:
    depends_on:
      prowlarr:
        condition: service_healthy
    volumes:
      - $APPDIR/radarr:/config
      - $DATADIR:/data
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      # HTTP Routers
      - traefik.http.routers.radarr.entrypoints=https
      - traefik.http.routers.radarr.rule=Host(`radarr.$DOMAINNAME`)
      # HTTP Routers Auth Bypass
      - traefik.http.routers.radarr-bypass.entrypoints=https
      - traefik.http.routers.radarr-bypass.rule=Host(`radarr.$DOMAINNAME`) && (Header(`X-Api-Key`, `$RADARR_API_KEY`) || Query(`apikey`, `$RADARR_API_KEY`))
      - traefik.http.routers.radarr-bypass.priority=100
      # Middlewares
      - traefik.http.routers.radarr.middlewares=chain-auth@file
      - traefik.http.routers.radarr-bypass.middlewares=chain-api@file
      # HTTP Services
      - traefik.http.routers.radarr.service=radarr
      - traefik.http.routers.radarr-bypass.service=radarr
      - traefik.http.services.radarr.loadbalancer.server.port=7878
      ## Updating and notifications
      - org.hotio.pullio.notify=true
      - org.hotio.pullio.update=true
      - org.hotio.pullio.discord.webhook=$DISCORD
      - org.hotio.pullio.generic.webhook=$PULLIO

  # Sonarr - TV
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    tmpfs:
      - /tmp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8989/ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    networks:
      mediaserver:
    depends_on:
      prowlarr:
        condition: service_healthy
    volumes:
      - $APPDIR/sonarr:/config
      - $DATADIR:/data
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      # HTTP Routers
      - traefik.http.routers.sonarr.entrypoints=https
      - traefik.http.routers.sonarr.rule=Host(`sonarr.$DOMAINNAME`)
      # HTTP Routers Auth Bypass
      - traefik.http.routers.sonarr-bypass.entrypoints=https
      - traefik.http.routers.sonarr-bypass.rule=Host(`sonarr.$DOMAINNAME`) && (Header(`X-Api-Key`, `$SONARR_API_KEY`) || Query(`apikey`, `$SONARR_API_KEY`))
      - traefik.http.routers.sonarr-bypass.priority=100
      # Middlewares
      - traefik.http.routers.sonarr.middlewares=chain-auth@file
      - traefik.http.routers.sonarr-bypass.middlewares=chain-api@file
      # HTTP Services
      - traefik.http.routers.sonarr.service=sonarr
      - traefik.http.routers.sonarr-bypass.service=sonarr
      - traefik.http.services.sonarr.loadbalancer.server.port=8989
      ## Updating and notifications
      - org.hotio.pullio.notify=true
      - org.hotio.pullio.update=true
      - org.hotio.pullio.discord.webhook=$DISCORD
      - org.hotio.pullio.generic.webhook=$PULLIO

  ############################# HOME THEATRE
  # Plex - Media Player
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl --connect-timeout 15 --silent --show-error --fail http://localhost:32400/identity"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    networks:
      mediaserver:
    ports:
      - 32400:32400/tcp
    devices: # optional (used if Syno has Intel CPU, for HW transcoding)
      - /dev/dri:/dev/dri
    group_add:
      - "937"  # videodriver group on Synology
    volumes:
      - $APPDIR/plex:/config:rw
      - $DATADIR/media:/data/media:rw
      - $APPDIR/plex/temp:/temp:rw
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      - VERSION=docker
      - UMASK=002
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      # HTTP Routers
      - traefik.http.routers.plex.entrypoints=https
      - traefik.http.routers.plex.rule=Host(`plex.$DOMAINNAME`)
      # Middlewares
      - traefik.http.routers.plex.middlewares=chain-media@file
      # HTTP Services
      - traefik.http.routers.plex.service=plex
      - traefik.http.services.plex.loadbalancer.server.port=32400
      ## Updating and notifications
      - org.hotio.pullio.notify=true
      - org.hotio.pullio.update=true
      - org.hotio.pullio.discord.webhook=$DISCORD
      - org.hotio.pullio.generic.webhook=$PULLIO

  ############################# MEDIA FILE MANAGEMENT
  # Tdarr - Transcode for compatibility with Plex streaming
  tdarr:
    image: ghcr.io/haveagitgat/tdarr:latest
    container_name: tdarr
    cpu_shares: 512
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8266/api/v2/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    networks:
      mediaserver:
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "937"  # videodriver group on Synology
    volumes:
      - $APPDIR/tdarr/server:/app/server
      - $APPDIR/tdarr/configs:/app/configs
      - $APPDIR/tdarr/logs:/app/logs
      - $APPDIR/tdarr/temp:/temp:rw
      - $DATADIR/media:/data/media:rw
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      - UMASK_SET=002
      - serverIP=0.0.0.0
      - serverPort=8266
      - webUIPort=8265
      - internalNode=true
      - inContainer=true
      - nodeName=TdarrNode
      - auth=false
      - openBrowser=false
      - maxLogSizeMB=4
      - cronPluginUpdate=
      - NVIDIA_VISIBLE_DEVICES=void
      - ffmpegVersion=6
      - VAAPI_DEVICE=/dev/dri/renderD128
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      # HTTP Routers
      - traefik.http.routers.tdarr.entrypoints=https
      - traefik.http.routers.tdarr.rule=Host(`tdarr.$DOMAINNAME`)
      # Middlewares
      - traefik.http.routers.tdarr.middlewares=chain-auth@file
      # HTTP Services
      - traefik.http.routers.tdarr.service=tdarr
      - traefik.http.services.tdarr.loadbalancer.server.port=8265
      ## Updating and notifications
      - org.hotio.pullio.notify=true
      - org.hotio.pullio.update=true
      - org.hotio.pullio.discord.webhook=$DISCORD
      - org.hotio.pullio.generic.webhook=$PULLIO

  ############################# PLEX MONITORING/MANAGEMENT
  # Tautulli - Media play and user monitoring
  tautulli:
    image: lscr.io/linuxserver/tautulli:latest
    container_name: tautulli
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8181/status || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    networks:
      mediaserver:
    depends_on:
      plex:
        condition: service_healthy
    volumes:
      - $APPDIR/tautulli:/config:rw
      - $PLEXLOGS:/plexlogs:rw
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      # HTTP Routers
      - traefik.http.routers.tautulli.entrypoints=https
      - traefik.http.routers.tautulli.rule=Host(`tautulli.$DOMAINNAME`)
      # HTTP Routers Auth Bypass
      - traefik.http.routers.tautulli-bypass.entrypoints=https
      - traefik.http.routers.tautulli-bypass.rule=Host(`tautulli.$DOMAINNAME`) && (Header(`X-Api-Key`, `$TAUTULLI_API_KEY`) || Query(`apikey`, `$TAUTULLI_API_KEY`))
      - traefik.http.routers.tautulli-bypass.priority=100
      # Middlewares
      - traefik.http.routers.tautulli.middlewares=chain-media@file
      - traefik.http.routers.tautulli-bypass.middlewares=chain-api@file
      # HTTP Services
      - traefik.http.routers.tautulli.service=tautulli
      - traefik.http.routers.tautulli-bypass.service=tautulli
      - traefik.http.services.tautulli.loadbalancer.server.port=8181
      ## Updating and notifications
      - org.hotio.pullio.notify=true
      - org.hotio.pullio.update=true
      - org.hotio.pullio.discord.webhook=$DISCORD
      - org.hotio.pullio.generic.webhook=$PULLIO

  # Seer - Allows Plex users to request media
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    restart: unless-stopped
    init: true
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 30s
      timeout: 5s
      interval: 30s
      retries: 3
    user: $PUID:$PGID
    security_opt:
      - no-new-privileges:true
    networks:
      mediaserver:
    depends_on:
      plex:
        condition: service_healthy
    volumes:
      - $APPDIR/seerr:/app/config
    environment:
      - LOG_LEVEL=error
      - TZ=$TZ
      - PORT=5055
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      # HTTP Routers
      - traefik.http.routers.overseerr.entrypoints=https
      - traefik.http.routers.overseerr.rule=Host(`overseerr.$DOMAINNAME`)
      # HTTP Routers Auth Bypass
      - traefik.http.routers.overseerr-bypass.entrypoints=https
      - traefik.http.routers.overseerr-bypass.rule=Host(`overseerr.$DOMAINNAME`) && (Header(`X-Api-Key`, `$OVERSEERR_API_KEY`) || Query(`apikey`, `$OVERSEERR_API_KEY`))
      - traefik.http.routers.overseerr-bypass.priority=100
      # Middlewares
      - traefik.http.routers.overseerr.middlewares=chain-media@file
      - traefik.http.routers.overseerr-bypass.middlewares=chain-api@file
      # HTTP Services
      - traefik.http.routers.overseerr.service=overseerr
      - traefik.http.routers.overseerr-bypass.service=overseerr
      - traefik.http.services.overseerr.loadbalancer.server.port=5055
      ## Updating and notifications
      - org.hotio.pullio.notify=true
      - org.hotio.pullio.update=true
      - org.hotio.pullio.discord.webhook=$DISCORD
      - org.hotio.pullio.generic.webhook=$PULLIO

  # Maintainerr - Scrub requested but unwatched media
  maintainerr:
    image: ghcr.io/maintainerr/maintainerr:latest
    container_name: maintainerr
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6246/api/app/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    user: $PUID:$PGID
    security_opt:
      - no-new-privileges:true
    networks:
      mediaserver:
    volumes:
      - $APPDIR/maintainerr:/opt/data
    environment:
      - TZ=$TZ
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      # HTTP Routers
      - traefik.http.routers.maintainerr.entrypoints=https
      - traefik.http.routers.maintainerr.rule=Host(`maintainerr.$DOMAINNAME`)
      # Middlewares
      - traefik.http.routers.maintainerr.middlewares=chain-auth@file
      # HTTP Services
      - traefik.http.routers.maintainerr.service=maintainerr
      - traefik.http.services.maintainerr.loadbalancer.server.port=6246
      ## Updating and notifications
      - org.hotio.pullio.notify=true
      - org.hotio.pullio.update=true
      - org.hotio.pullio.discord.webhook=$DISCORD
      - org.hotio.pullio.generic.webhook=$PULLIO

  ############################# BOOK LIBRARY MANAGEMENT
  # Calibre Web Automated - fork of Calibre-web, includes auto conversion
  calibreweb:
    image: crocodilestick/calibre-web-automated:latest
    container_name: books
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    security_opt:
      - no-new-privileges:true
    networks:
      mediaserver:
    volumes:
      - $APPDIR/books:/config
      - $DATADIR/imports:/cwa-book-ingest
      - $DATADIR/media/books:/calibre-library
      - $APPDIR/books/custom-files:/custom-cont-init.d:ro
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      - DOCKER_MODS=lscr.io/linuxserver/mods:universal-calibre-v7.16.0
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      # HTTP Routers
      - traefik.http.routers.books.entrypoints=https
      - traefik.http.routers.books.rule=Host(`books.$DOMAINNAME`)
      # Middlewares
      - traefik.http.routers.books.middlewares=chain-auth@file
      # HTTP Services
      - traefik.http.routers.books.service=books
      - traefik.http.services.books.loadbalancer.server.port=8083
      ## Updating and notifications
      - org.hotio.pullio.notify=true
      - org.hotio.pullio.update=true
      - org.hotio.pullio.discord.webhook=$DISCORD
      - org.hotio.pullio.generic.webhook=$PULLIO

  ############################# SYSTEM MANAGEMENT/MONITORING
  # Dockhand - full stack management, log viewer
  dockhand:
    image: fnsys/dockhand:latest
    container_name: dockhand
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      mediaserver:
      socket-proxy:
    depends_on:
      socket-proxy:
        condition: service_healthy
    group_add:
      - "65540"  # Use host's Docker GID
    volumes:
      - $APPDIR/dockhand:/app/data:rw
      - $APPDIR:/compose
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
      - DOCKER_HOST=tcp://socket-proxy:2375
      - HOST_DATA_DIR=$APPDIR/dockhand
      - SKIP_DF_COLLECTION=true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      # HTTP Routers
      - traefik.http.routers.dockhand.entrypoints=https
      - traefik.http.routers.dockhand.rule=Host(`dockhand.$DOMAINNAME`)
      # Middlewares
      - traefik.http.routers.dockhand.middlewares=chain-auth@file
      # HTTP Services
      - traefik.http.routers.dockhand.service=dockhand
      - traefik.http.services.dockhand.loadbalancer.server.port=3000
      ## Updating and notifications
      - org.hotio.pullio.notify=true
      - org.hotio.pullio.update=true
      - org.hotio.pullio.discord.webhook=$DISCORD
      - org.hotio.pullio.generic.webhook=$PULLIO

  # Notifiarr - update ARR profiles
  notifiarr:
    image: golift/notifiarr:latest
    container_name: notifiarr
    hostname: notifiarr #must be set, can be anything
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5454/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    networks:
      mediaserver:
    volumes:
      - $APPDIR/notifiarr:/config
      - /var/run/utmp:/var/run/utmp
      - /etc/machine-id:/etc/machine-id
    environment:
      - USER=$PUID
      - TZ=$TZ
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      # HTTP Routers
      - traefik.http.routers.notifiarr.entrypoints=https
      - traefik.http.routers.notifiarr.rule=Host(`notifiarr.$DOMAINNAME`)
      # Middlewares
      - traefik.http.routers.notifiarr.middlewares=chain-auth@file
      # HTTP Services
      - traefik.http.routers.notifiarr.service=notifiarr
      - traefik.http.services.notifiarr.loadbalancer.server.port=5454
      ## Updating and notifications
      - org.hotio.pullio.notify=true
      - org.hotio.pullio.update=true
      - org.hotio.pullio.discord.webhook=$DISCORD
      - org.hotio.pullio.generic.webhook=$PULLIO

  ############################# SECURITY/PASSWORD MANAGEMENT
  # Vaultwarden - Locally-hosted Bitwarden
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      mediaserver:
    volumes:
      - $APPDIR/vaultwarden:/data
    environment:
      - PUID=$PUID
      - PGID=$PGID
      - TZ=$TZ
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      # HTTP Routers (web vault â€” stays behind OAuth + frame-ancestors: none)
      - traefik.http.routers.vaultwarden.entrypoints=https
      - traefik.http.routers.vaultwarden.rule=Host(`vaultwarden.$DOMAINNAME`)
      # Middlewares
      - traefik.http.routers.vaultwarden.middlewares=chain-auth@file
      # HTTP Services
      - traefik.http.routers.vaultwarden.service=vaultwarden
      - traefik.http.routers.vaultwarden-api.service=vaultwarden
      - traefik.http.services.vaultwarden.loadbalancer.server.port=80
      ## Updating and notifications
      - org.hotio.pullio.notify=true
      - org.hotio.pullio.update=true
      - org.hotio.pullio.discord.webhook=$DISCORD
      - org.hotio.pullio.generic.webhook=$PULLIO
