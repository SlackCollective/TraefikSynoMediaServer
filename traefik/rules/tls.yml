tls:
  options:
    default:                      # "default" auto-applies to every TLS router — no compose change needed
      minVersion: VersionTLS12
      curvePreferences:
        - X25519
        - CurveP256
      cipherSuites:               # only affects TLS 1.2; TLS 1.3 suites are fixed by Go
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
      # sniStrict: true           # optional & stricter: refuses non-matching SNI (can break odd clients)
