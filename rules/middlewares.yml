http:
  middlewares:

    # Basic rate limiting
    basic-ratelimit:
      rateLimit:
        average: 100          # 100 requests per period
        burst: 50             # Allow burst of 50 requests
        period: 1m            # Per minute (default)
    
    # Stricter rate limiting for API endpoints
    api-ratelimit:
      rateLimit:
        average: 50
        burst: 25
        period: 1m

    compress:
      compress: {}

    auth:
      forwardAuth:
        address: "http://auth:4181/portals/main"
        trustForwardHeader: true
        maxResponseBodySize: 12288
        authResponseHeaders:
          - "X-Forwarded-User"
          - "X-Forwarded-Displayname"
          - "X-Authenticated-User"

    # Generic headers
    generic-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        
        contentSecurityPolicy: >
          frame-src 'self' 
                   https://*.plex.tv https://plex.tv
                   https://*.brunswickmedia.co.za
                   https://brunswickmedia.co.za
                   https://*.google.com;
          img-src 'self' data: blob: https: http:;
          frame-ancestors 'self' https://app.plex.tv https://brunswickmedia.co.za https://*.brunswickmedia.co.za;

          default-src 'self';
          script-src 'self';
          style-src 'self' 'unsafe-inline';
          font-src 'self' data:;
          connect-src 'self';
          base-uri 'self';
          form-action 'self';
          upgrade-insecure-requests;

        accessControlAllowMethods:
          - GET
          - POST
          - DELETE
          - OPTIONS
          - PUT
        accessControlAllowHeaders: "*"
        accessControlAllowOriginList: "*"
        accessControlMaxAge: 100
        addVaryHeader: true

        permissionsPolicy: >
            camera=(),
            microphone=(),
            geolocation=(),
            payment=(),
            usb=(),
            autoplay=()

        customResponseHeaders:
            X-XSS-Protection: "0"
            X-Robots-Tag: "noindex, nofollow"
            Server: ""

    # Curated headers for Plex
    media-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        
        # Plex-tuned CSP - more permissive than static sites but still secure
        contentSecurityPolicy: |
          default-src 'self';
          script-src 'self' 'unsafe-inline' 'unsafe-eval' 
                   https://*.plex.tv https://plex.tv 
                   https://*.plex.direct https://*.plex.services
                   https://*.cloudfront.net https://*.amazonaws.com
                   https://www.gstatic.com https://www.google.com
                   https://*.googleapis.com
                   https://*.stripe.com https://stripe.com
                   https://*.brunswickmedia.co.za
                   blob:;
          style-src 'self' 'unsafe-inline' 
                   https://*.plex.tv https://plex.tv
                   https://fonts.googleapis.com
                   https://*.googleapis.com;
          img-src 'self' data: blob: https: http:;
          font-src 'self' data: 
                   https://fonts.gstatic.com 
                   https://*.plex.tv;
          connect-src 'self' 
                     https://*.plex.tv https://plex.tv 
                     https://*.plex.direct https://*.plex.services
                     https://pubsub.plex.tv wss://pubsub.plex.tv
                     https://*.brunswickmedia.co.za
                     wss: ws:;
          media-src 'self' blob: data: 
                    https://*.plex.tv
                    http://*.plex.direct
                    https://*.brunswickmedia.co.za;
          worker-src 'self' blob:;
          frame-src 'self' 
                   https://*.plex.tv https://plex.tv
                   https://*.brunswickmedia.co.za
                   https://brunswickmedia.co.za
          frame-ancestors 'self' https://app.plex.tv https://brunswickmedia.co.za https://*.brunswickmedia.co.za;
          base-uri 'self';
          form-action 'self' https://*.plex.tv https://plex.tv https://brunswickmedia.co.za https://*.brunswickmedia.co.za;
          upgrade-insecure-requests;

        accessControlAllowMethods:
          - GET
          - POST
          - DELETE
          - OPTIONS
          - PUT
        accessControlAllowHeaders: "*"
        accessControlAllowOriginList: "*"
        accessControlMaxAge: 100
        addVaryHeader: true

        permissionsPolicy: |
          camera=(), 
          microphone=(), 
          geolocation=(), 
          payment=(self https://*.stripe.com), 
          usb=(),
          vr=(),
          autoplay=(self)
        
        customResponseHeaders:
          X-XSS-Protection: "0"        # Disabled — deprecated and harmful in some browsers
          X-Robots-Tag: "noindex, nofollow"
          Server: ""
