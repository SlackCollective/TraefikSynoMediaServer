http:
  middlewares:

    # Basic rate limiting
    basic-ratelimit:
      rateLimit:
        average: 100          # 100 requests per period
        burst: 50             # Allow burst of 50 requests
        period: 1m            # Per minute (default)
    
    # Stricter rate limiting for API endpoints
    api-ratelimit:
      rateLimit:
        average: 50
        burst: 25
        period: 1m

    compress:
      compress: {}

    auth:
      forwardAuth:
        address: "http://auth:4181/portals/main"
        trustForwardHeader: true
        authResponseHeaders:
          - "X-Forwarded-User"
          - "X-Forwarded-Displayname"
          - "X-Authenticated-User"

    generic-auth-headers:
      headers:
        # HSTS - force HTTPS even after Traefik redirect
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true           # Required when behind a reverse proxy

        # Basic security
        contentTypeNosniff: true       # Sets X-Content-Type-Options: nosniff
        referrerPolicy: "strict-origin-when-cross-origin"
        customFrameOptionsValue: "SAMEORIGIN"   # Sets X-Frame-Options

        # CSP - permits Organizr's iframe embedding of your own subdomains,
        # inline scripts/styles (required by Organizr/PHP apps), and nothing else
        contentSecurityPolicy: |
          default-src 'self';
          script-src 'self' 'unsafe-inline' 'unsafe-eval';
          style-src 'self' 'unsafe-inline';
          img-src 'self' data: blob: https:;
          font-src 'self' data:;
          connect-src 'self' https://*.brunswickmedia.co.za wss:;
          media-src 'self' blob:;
          worker-src 'self' blob:;
          frame-src 'self' https://*.brunswickmedia.co.za https://brunswickmedia.co.za;
          frame-ancestors 'self' https://brunswickmedia.co.za https://*.brunswickmedia.co.za;
          base-uri 'self';
          form-action 'self' https://*.brunswickmedia.co.za;
          upgrade-insecure-requests;

        permissionsPolicy: |
          camera=(),
          microphone=(),
          geolocation=(),
          payment=(),
          usb=(),
          autoplay=(self)

        # customResponseHeaders only for things not covered above.
        # X-Content-Type-Options, X-Frame-Options are already set by the
        # Traefik directives above — do NOT repeat them here.
        customResponseHeaders:
          X-XSS-Protection: "0"        # Disabled — deprecated and harmful in some browsers
          X-Robots-Tag: "noindex, nofollow"
          Server: ""                   # Suppress server version disclosure

    # Curated headers for Plex
    plex-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        contentTypeNosniff: true
        referrerPolicy: "strict-origin-when-cross-origin"
        customFrameOptionsValue: "SAMEORIGIN"
        
        # Plex-tuned CSP - more permissive than static sites but still secure
        contentSecurityPolicy: |
          default-src 'self';
          script-src 'self' 'unsafe-inline' 'unsafe-eval' 
                   https://*.plex.tv https://plex.tv 
                   https://*.plex.direct https://*.plex.services
                   https://*.cloudfront.net https://*.amazonaws.com
                   https://www.gstatic.com https://www.google.com
                   https://*.googleapis.com
                   https://*.stripe.com https://stripe.com
                   https://*.brunswickmedia.co.za
                   blob:;
          style-src 'self' 'unsafe-inline' 
                   https://*.plex.tv https://plex.tv
                   https://fonts.googleapis.com
                   https://*.googleapis.com;
          img-src 'self' data: blob: https: http:;
          font-src 'self' data: 
                   https://fonts.gstatic.com 
                   https://*.plex.tv;
          connect-src 'self' 
                     https://*.plex.tv https://plex.tv 
                     https://*.plex.direct https://*.plex.services
                     https://pubsub.plex.tv wss://pubsub.plex.tv
                     https://*.cloudfront.net https://*.amazonaws.com
                     https://metadata.provider.plex.tv
                     https://analytics.plex.tv
                     https://*.stripe.com https://api.stripe.com
                     https://*.google-analytics.com
                     https://*.brunswickmedia.co.za
                     wss: ws:;
          media-src 'self' blob: data: 
                    https://*.plex.tv
                    http://*.plex.direct
                    https://*.brunswickmedia.co.za;
          worker-src 'self' blob:;
          frame-src 'self' 
                   https://*.plex.tv https://plex.tv
                   https://*.youtube.com https://youtube.com
                   https://*.vimeo.com
                   https://*.stripe.com
                   https://*.brunswickmedia.co.za
                   https://brunswickmedia.co.za
                   https://*.google.com;
          frame-ancestors 'self' https://app.plex.tv https://*.brunswickmedia.co.za;
          base-uri 'self';
          form-action 'self' https://*.plex.tv https://plex.tv https://*.brunswickmedia.co.za;
          upgrade-insecure-requests;
        
        permissionsPolicy: |
          camera=(), 
          microphone=(), 
          geolocation=(), 
          payment=(self https://*.stripe.com), 
          usb=(),
          vr=(),
          autoplay=(self)
        
        customResponseHeaders:
          X-XSS-Protection: "0"        # Disabled — deprecated and harmful in some browsers
          X-Robots-Tag: "noindex, nofollow"
          Server: ""

    # Vaultwarden web vault headers — full standalone CSP, not a patch over generic-auth-headers.
    # generic-auth-headers sets the CSP first; this middleware runs after it in chain-vaultwarden
    # and replaces the entire Content-Security-Policy value, so it must be self-contained.
    vaultwarden-override:
      headers:
        customFrameOptionsValue: "DENY"
        contentSecurityPolicy: |
          default-src 'self';
          script-src 'self';
          style-src 'self' 'unsafe-inline';
          img-src 'self' data: https:;
          font-src 'self' data:;
          connect-src 'self';
          frame-src 'none';
          frame-ancestors 'none';
          base-uri 'self';
          form-action 'self';
          upgrade-insecure-requests;


    # API-specific headers (minimal, functional)
    api-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        contentTypeNosniff: true
        referrerPolicy: "no-referrer"
        customResponseHeaders:
          Cache-Control: "no-store, max-age=0"
          Server: ""                   # Suppress server version disclosure

    # Tautulli-specific headers — extends the generic set with Plex-domain sources
    # so the Tautulli web UI can reach Plex CDN for artwork and API responses
    tautulli-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        contentTypeNosniff: true
        referrerPolicy: "strict-origin-when-cross-origin"
        customFrameOptionsValue: "SAMEORIGIN"

        contentSecurityPolicy: |
          default-src 'self';
          script-src 'self' 'unsafe-inline' 'unsafe-eval';
          style-src 'self' 'unsafe-inline';
          img-src 'self' data: blob: https: http:;
          font-src 'self' data:;
          connect-src 'self'
                    https://*.brunswickmedia.co.za wss:
                    https://*.plex.tv https://plex.tv
                    https://*.plex.direct https://*.plex.services
                    https://pubsub.plex.tv wss://pubsub.plex.tv
                    https://analytics.plex.tv
                    https://metadata.provider.plex.tv;
          media-src 'self' blob:;
          worker-src 'self' blob:;
          frame-src 'self' https://*.brunswickmedia.co.za https://brunswickmedia.co.za;
          frame-ancestors 'self' https://brunswickmedia.co.za https://*.brunswickmedia.co.za;
          base-uri 'self';
          form-action 'self' https://*.brunswickmedia.co.za;
          upgrade-insecure-requests;

        permissionsPolicy: |
          camera=(),
          microphone=(),
          geolocation=(),
          payment=(),
          usb=(),
          autoplay=(self)

        customResponseHeaders:
          X-XSS-Protection: "0"
          X-Robots-Tag: "noindex, nofollow"
          Server: ""

    # Vaultwarden API headers — used on sync/client paths (/api, /identity, /notifications…)
    # No frame restrictions; Bitwarden clients handle their own auth on these routes
    vaultwarden-api-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
        forceSTSHeader: true
        contentTypeNosniff: true
        referrerPolicy: "no-referrer"
        customResponseHeaders:
          Cache-Control: "no-store, max-age=0"
          Server: ""