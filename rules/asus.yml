http:
  ## EXTERNAL ROUTING - use if you want to proxy something manually ##
  routers:
    asus:
      entryPoints:
        - websecure
      rule: 'Host(`asus.brunswickmedia.co.za`)'
      service: asus
      middlewares:
        - chain-auth@file
        
  ## SERVICES ##
  services:
    asus:
      loadBalancer:
        serversTransport: insecureTransport
        servers:
          - url: https://192.168.1.1:8443
        passHostHeader: true
