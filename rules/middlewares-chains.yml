http:
  middlewares:
    # Chain: Rate limiting, auth, generic Traefik headers with CORS
    chain-auth:
      chain:
        middlewares:
          - "generic-headers"
          - "basic-ratelimit"
          - "auth"
          - "compress"

    # Chain: Rate limiting, generic Traefik headers with CORS
    chain-noauth:
      chain:
        middlewares:
          - "generic-headers"
          - "basic-ratelimit"
          - "compress"

    # API chain (different rate limits, no browser headers)
    chain-api:
      chain:
        middlewares:
          - "api-ratelimit"
          - "compress"

    # Chain for Plex & Tautulli
    chain-media:
      chain:
        middlewares:
          - "media-headers"
          - "basic-ratelimit"
          - "compress"
