http:
  middlewares:
    chain-auth:
      chain:
        middlewares:
          - "rate-limit"
          - "secure-headers"
          - "auth"
          - "https-redirectscheme"
          - "compress"
    chain-noauth:
      chain:
        middlewares:
          - "rate-limit"
          - "secure-headers"
          - "https-redirectscheme"
          - "compress"