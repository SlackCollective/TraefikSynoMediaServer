http:
  middlewares:
    # Chain: Rate limiting, auth, default Traefik headers
    chain-auth:
      chain:
        middlewares:
          - "basic-ratelimit"
          - "auth"
          - "compress"

    # API chain (different rate limits, same security)
    chain-api:
      chain:
        middlewares:
          - "api-ratelimit"
          - "compress"

    # Chain for Plex & Tautulli
    chain-media:
      chain:
        middlewares:
          - "basic-ratelimit"
          # - "media-headers"
          - "compress"
